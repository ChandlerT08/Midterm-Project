<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Untitled Game</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" defer>
</head>
<body>
    <div id="sceneDiv">
        <h1 id="sceneHeader">Scene I</h1>
        <p id="sceneDescription">You are in the first scene</p>
        <button id="proceed">Proceed</button>
        <button id="giveUp">Give Up</button>
    </div>

    <div id="fightContainer" hidden>
        <div id="bossDiv">
            <p id="bossName">Boss</p>
            <progress id="bossRepose" value="100" max="100" min="0"></progress>
            <div id="bossSprite">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 150" width="240" height="300">
                    <ellipse cx="60" cy="105" rx="35" ry="30" fill="#8b0000"/>
                    <line x1="40" y1="78" x2="25" y2="42" stroke="#8b0000" stroke-width="10" stroke-linecap="round"/>
                    <line x1="60" y1="75" x2="60" y2="30" stroke="#8b0000" stroke-width="10" stroke-linecap="round"/>
                    <line x1="80" y1="78" x2="95" y2="42" stroke="#8b0000" stroke-width="10" stroke-linecap="round"/>
                    <ellipse cx="22" cy="35" rx="14" ry="10" fill="#8b0000"/>
                    <circle cx="17" cy="32" r="3" fill="#ff4500"/>
                    <ellipse cx="60" cy="22" rx="14" ry="10" fill="#8b0000"/>
                    <circle cx="55" cy="19" r="3" fill="#ff4500"/>
                    <ellipse cx="98" cy="35" rx="14" ry="10" fill="#8b0000"/>
                    <circle cx="93" cy="32" r="3" fill="#ff4500"/>
                    <line x1="45" y1="128" x2="38" y2="145" stroke="#8b0000" stroke-width="8" stroke-linecap="round"/>
                    <line x1="75" y1="128" x2="82" y2="145" stroke="#8b0000" stroke-width="8" stroke-linecap="round"/>
                    <line x1="38" y1="145" x2="30" y2="142" stroke="#ff4500" stroke-width="3" stroke-linecap="round"/>
                    <line x1="38" y1="145" x2="37" y2="150" stroke="#ff4500" stroke-width="3" stroke-linecap="round"/>
                    <line x1="82" y1="145" x2="90" y2="142" stroke="#ff4500" stroke-width="3" stroke-linecap="round"/>
                    <line x1="82" y1="145" x2="83" y2="150" stroke="#ff4500" stroke-width="3" stroke-linecap="round"/>
                </svg>
            </div>
        </div>

        <div id="keyDisplay">
            <div id="keyBox"></div>
            <p id="parryCount"></p>
        </div>

        <div id="playerDiv">
            <div id="playerSprite">
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 130" width="80" height="130">
                    <circle cx="40" cy="18" r="13" fill="#aaa"/>
                    <path d="M27 18 Q27 5 40 5 Q53 5 53 18" fill="#888"/>
                    <rect x="30" y="14" width="20" height="6" rx="2" fill="#4a90d9" opacity="0.8"/>
                    <rect x="27" y="32" width="26" height="35" rx="4" fill="#888"/>
                    <rect x="33" y="36" width="14" height="10" rx="2" fill="#aaa"/>
                    <rect x="13" y="33" width="12" height="28" rx="5" fill="#888"/>
                    <rect x="55" y="33" width="12" height="28" rx="5" fill="#888"/>
                    <line x1="70" y1="28" x2="70" y2="72" stroke="#ccc" stroke-width="3" stroke-linecap="round"/>
                    <line x1="64" y1="44" x2="76" y2="44" stroke="#999" stroke-width="4" stroke-linecap="round"/>
                    <rect x="28" y="67" width="11" height="35" rx="4" fill="#777"/>
                    <rect x="41" y="67" width="11" height="35" rx="4" fill="#777"/>
                    <rect x="26" y="98" width="13" height="10" rx="3" fill="#555"/>
                    <rect x="41" y="98" width="13" height="10" rx="3" fill="#555"/>
                </svg>
            </div>
            <p id="playerName">Player</p>
            <progress id="playerRepose" value="100" max="100" min="0"></progress>
        </div>
    </div>

</body>
</html>
