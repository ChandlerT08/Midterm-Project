<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaiju-Slayer</title>
    <script src="script.js" defer></script>
    <link rel="stylesheet" href="style.css" defer>
</head>
<body>

    <img id="sceneBg" src="images/bg-intro.jpg" alt="Intro background">
    
    <div id="sceneDiv">
        <h1 id="sceneHeader">Scene I</h1>
        <p id="sceneDescription">You are in the first scene</p>
        <div id="nameInputDiv">
            <label for="nameInput">Enter your name, Slayer:</label>
            <input type="text" id="nameInput" placeholder="Your Name" maxlength="20">
        </div>

        <p id="hintText" hidden>Press W, A, S, or D to parry the attacks before you run out of time.</p>

        <button id="proceed">Proceed</button>
        <button id="giveUp">Give Up</button>
        <button id="reset">Reset Game</button>
    </div>

    <div id="relicSelectionDiv" hidden>
        <h2 id="relicSelectionHeader">Consume the essence of the kaiju you slayed and grow stronger</h2>
        <p id="relicSelectionSubtitle">Choose one relic from the fallen</p>
        <div id="relicOptions"></div>
        </div>

        <div id="relicPanel" hidden>
        <p id="relicHeader">Relics</p>
        <div id="relicList"></div>
    </div>

    <div id="fightContainer" hidden>
        <div id="bossDiv">
            <p id="bossName">Boss</p>
            <progress id="bossRepose" value="100" max="100" min="0"></progress>
            <div id="bossSprite">
                <img id="bossImage" src="images/boss1_minotaur.png" alt="Boss">
                <div id="bossToolTip">Hover for info</div>
            </div>
        </div>

        <div id="keyDisplay">
            <div id="keyBox"></div>
            <p id="parryCount"></p>
        </div>

        <div id="playerDiv">
            <div id="playerSprite">
                <img id="playerImage" src="images/player.png" alt="Player">
            </div>
            <p id="playerName">Player</p>
            <progress id="playerRepose" value="100" max="100" min="0"></progress>
        </div>
    </div>

</body>
</html>
